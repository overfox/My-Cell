<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limo's World</title>
<style>
  :root {
    --cream: #fffdf5;
    --ink: #2b2d42;
    --red: #ff5d73;
    --teal: #2ec4b6;
    --yellow: #ffd23f;
    --purple: #9b5de5;
    --blue: #4cc9f0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Baloo 2", system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 15%, #fff3a8 0 70px, transparent 71px),
      linear-gradient(160deg, #8ddcff 0%, #b8a4ff 55%, #ffb3e6 100%);
    background-attachment: fixed;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--cream);
    border: 6px solid #fff;
    border-radius: 30px;
    padding: 20px 22px 26px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 18px 0 rgba(0,0,0,0.12), 0 24px 50px rgba(0,0,0,0.25);
    text-align: center;
    position: relative;
  }
  h1 {
    margin: 4px 0 16px;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--purple);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(155,93,229,0.25);
    animation: wiggle 3s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-2deg); }
    50%     { transform: rotate(2deg); }
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .tab {
    flex: 1;
    border: 4px solid var(--ink);
    background: #fff;
    color: var(--ink);
    padding: 12px 4px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 800;
    border-radius: 18px;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--ink);
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s;
  }
  .tab:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--ink); }
  .tab.active { background: var(--yellow); }
  .panel { display: none; }
  .panel.active { display: block; animation: pop 0.25s ease; }
  @keyframes pop {
    0% { transform: scale(0.96); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .stage {
    background: #fff;
    border: 5px dashed var(--blue);
    border-radius: 22px;
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 16px;
    padding: 10px;
  }
  .stage img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  #flagImg { box-shadow: 0 6px 16px rgba(0,0,0,0.25); }
  /* mapsicon shapes are white silhouettes — tint them bright purple */
  #shapeImg, .combo-shape {
    padding: 8px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25))
            brightness(0) saturate(100%) invert(38%) sepia(89%)
            saturate(2400%) hue-rotate(258deg) brightness(95%) contrast(95%);
  }
  .stage-both { padding: 12px; }
  .combo {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; width: 100%; height: 100%;
  }
  .combo img { max-width: 48%; max-height: 100%; border-radius: 8px; }
  .combo-flag { box-shadow: 0 6px 16px rgba(0,0,0,0.25); }
  @media (max-width: 400px) {
    .combo { flex-direction: column; gap: 8px; }
    .combo img { max-width: 78%; max-height: 48%; }
  }
  .placeholder {
    color: #8a8d9f;
    font-size: 1.15rem;
    font-weight: 700;
    padding: 0 18px;
    line-height: 1.4;
  }
  .name {
    min-height: 2.4rem;
    font-size: 1.9rem;
    font-weight: 800;
    margin-bottom: 18px;
    color: var(--teal);
  }
  .name.revealed { animation: boing 0.5s ease; }
  @keyframes boing {
    0% { transform: scale(0.3); }
    60% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .name.hidden-name {
    color: #b7bac7;
    font-weight: 700;
    font-size: 1.2rem;
  }
  .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  button.action {
    flex: 1 1 150px;
    border: 4px solid var(--ink);
    border-radius: 20px;
    padding: 16px 14px;
    font-family: inherit;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 6px 0 var(--ink);
    transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.2s;
  }
  button.action:active { transform: translateY(5px); box-shadow: 0 1px 0 var(--ink); }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0 6px 0 var(--ink); transform: none; }
  .draw-btn { background: var(--yellow); }
  .reveal-btn { background: var(--red); color: #fff; }
  .count {
    margin-top: 16px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--purple);
  }
  /* confetti */
  .confetti {
    position: fixed;
    top: -40px;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0.9; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🌍 Limo's World 🚀</h1>

    <div class="tabs">
      <button class="tab active" data-tab="flag">🚩 Flags</button>
      <button class="tab" data-tab="shape">🗺️ Shapes</button>
      <button class="tab" data-tab="both">✨ Both</button>
    </div>

    <!-- FLAGS TAB -->
    <div class="panel active" id="panel-flag">
      <div class="stage">
        <img id="flagImg" alt="" style="display:none;">
        <div class="placeholder" id="flagPlaceholder">Tap the big button to see a mystery flag! 🚩</div>
      </div>
      <div class="name hidden-name" id="flagName">🙈 Tap Who is it?</div>
      <div class="buttons">
        <button class="action draw-btn" id="flagBtn">🎲 New Flag!</button>
        <button class="action reveal-btn" id="flagReveal" disabled>🙈 Who is it?</button>
      </div>
    </div>

    <!-- MAP SHAPES TAB -->
    <div class="panel" id="panel-shape">
      <div class="stage">
        <img id="shapeImg" alt="" style="display:none;">
        <div class="placeholder" id="shapePlaceholder">Tap to see a mystery country shape! 🗺️</div>
      </div>
      <div class="name hidden-name" id="shapeName">🙈 Tap Who is it?</div>
      <div class="buttons">
        <button class="action draw-btn" id="shapeBtn">🎲 New Shape!</button>
        <button class="action reveal-btn" id="shapeReveal" disabled>🙈 Who is it?</button>
      </div>
    </div>

    <!-- BOTH TAB -->
    <div class="panel" id="panel-both">
      <div class="stage stage-both">
        <div class="combo" id="comboMedia" style="display:none;">
          <img id="bothFlagImg" class="combo-flag" alt="">
          <img id="bothShapeImg" class="combo-shape" alt="">
        </div>
        <div class="placeholder" id="bothPlaceholder">Tap to see a flag AND a shape together! ✨</div>
      </div>
      <div class="name hidden-name" id="bothName">🙈 Tap Who is it?</div>
      <div class="buttons">
        <button class="action draw-btn" id="bothBtn">🎲 Surprise!</button>
        <button class="action reveal-btn" id="bothReveal" disabled>🙈 Who is it?</button>
      </div>
    </div>

    <div class="count" id="count"></div>
  </div>

<script>

  {n:"Colombia",c:"co"},{n:"Comoros",c:"km"},{n:"Congo (Brazzaville)",c:"cg"},{n:"Congo (Kinshasa)",c:"cd"},

  {n:"El Salvador",c:"sv"},{n:"Equatorial Guinea",c:"gq"},{n:"Eritrea",c:"er"},{n:"Estonia",c:"ee"},

  {n:"Ireland",c:"ie"},{n:"Israel",c:"il"},{n:"Italy",c:"it"},{n:"Jamaica",c:"jm"},

  {n:"Kiribati",c:"ki"},{n:"Kuwait",c:"kw"},{n:"Kyrgyzstan",c:"kg"},{n:"Laos",c:"la"},

  {n:"Niger",c:"ne"},{n:"Nigeria",c:"ng"},{n:"North Korea",c:"kp"},{n:"North Macedonia",c:"mk"},

  {n:"United Arab Emirates",c:"ae"},{n:"United Kingdom",c:"gb"},{n:"United States",c:"us"},{n:"Uruguay",c:"uy"},
  {n:"Uzbekistan",c:"uz"},{n:"Vanuatu",c:"vu"},{n:"Vatican City",c:"va"},{n:"Venezuela",c:"ve"},
  {n:"Vietnam",c:"vn"},{n:"Yemen",c:"ye"},{n:"Zambia",c:"zm"},{n:"Zimbabwe",c:"zw"}
];

const HIDDEN_TEXT = "🙈 Tap Who is it?";

document.getElementById("count").textContent = "🎉 " + countries.length + " countries to explore!";

// ---- Fun sounds (no files needed) ----
let audioCtx = null;
function beep(freq, start, dur, type = "sine", gain = 0.15) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const t = audioCtx.currentTime + start;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}
function playPop()   { beep(520, 0, 0.12, "triangle", 0.18); }
function playCheer() { [523, 659, 784, 1046].forEach((f, i) => beep(f, i * 0.09, 0.18, "square", 0.12)); }

// ---- Confetti ----
const CONFETTI = ["🎉","⭐","🌟","🎊","✨","🏆","🥳","🌈"];
function spawnConfetti() {
  for (let i = 0; i < 24; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
    el.style.left = Math.random() * 100 + "vw";
    const dur = 1.6 + Math.random() * 1.4;
    el.style.animationDuration = dur + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 100);
  }
}

// ---- Tab switching ----
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
  });
});

function randomCountry() {
  return countries[Math.floor(Math.random() * countries.length)];
}

// Image source helpers
const flagSrc  = country => "https://flagcdn.com/w640/" + country.c + ".png";
const shapeSrc = country => "https://cdn.jsdelivr.net/gh/djaiss/mapsicon@master/all/" + country.c + "/1024.png";

// ---- Generic wiring for a draw/reveal panel ----
function setupPanel({ drawId, revealId, mediaId, images, placeholderId, nameId }) {
  const drawBtn = document.getElementById(drawId);
  const revealBtn = document.getElementById(revealId);
  const media = document.getElementById(mediaId);
  const placeholder = document.getElementById(placeholderId);
  const nameEl = document.getElementById(nameId);
  const imgs = images.map(({ id, srcFor }) => ({ el: document.getElementById(id), srcFor }));
  let current = null;

  drawBtn.addEventListener("click", () => {
    current = randomCountry();
    imgs.forEach(({ el, srcFor }) => { el.src = srcFor(current); el.alt = ""; });
    media.style.display = "";
    placeholder.style.display = "none";

    // Hide the name again every time a new country is drawn
    nameEl.textContent = HIDDEN_TEXT;
    nameEl.classList.add("hidden-name");
    nameEl.classList.remove("revealed");
    revealBtn.disabled = false;
    playPop();
  });

  revealBtn.addEventListener("click", () => {
    if (!current) return;
    nameEl.textContent = "🎉 " + current.n + "!";
    nameEl.classList.remove("hidden-name");
    void nameEl.offsetWidth;       // restart the boing animation
    nameEl.classList.add("revealed");
    playCheer();
    spawnConfetti();
  });
}

// Flags tab
setupPanel({
  drawId: "flagBtn", revealId: "flagReveal", mediaId: "flagImg",
  placeholderId: "flagPlaceholder", nameId: "flagName",
  images: [{ id: "flagImg", srcFor: flagSrc }]
});

// Map shapes tab
setupPanel({
  drawId: "shapeBtn", revealId: "shapeReveal", mediaId: "shapeImg",
  placeholderId: "shapePlaceholder", nameId: "shapeName",
  images: [{ id: "shapeImg", srcFor: shapeSrc }]
});

// Both tab: flag + map shape together
setupPanel({
  drawId: "bothBtn", revealId: "bothReveal", mediaId: "comboMedia",
  placeholderId: "bothPlaceholder", nameId: "bothName",
  images: [
    { id: "bothFlagImg", srcFor: flagSrc },
    { id: "bothShapeImg", srcFor: shapeSrc }
  ]
});
</script>

</html>
