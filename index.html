<style>
  :root {
    --cream: #fffdf5;
    --ink: #2b2d42;
    --red: #ff5d73;
    --teal: #2ec4b6;
    --yellow: #ffd23f;
    --purple: #9b5de5;
    --blue: #4cc9f0;
    --green: #43c463;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Baloo 2", system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 12%, #fff3a8 0 60px, transparent 61px),
      linear-gradient(160deg, #8ddcff 0%, #b8a4ff 55%, #ffb3e6 100%);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 8px;
  }
  .card {
    background: var(--cream);
    border: 5px solid #fff;
    border-radius: 24px;
    padding: 12px 14px;
    width: min(500px, 100%);
    height: 100%;
    max-height: 760px;
    box-shadow: 0 12px 0 rgba(0,0,0,0.12), 0 20px 40px rgba(0,0,0,0.25);
    text-align: center;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  h1 {
    margin: 0 0 8px;
    font-size: clamp(1.3rem, 5.5vw, 1.8rem);
    font-weight: 800;
    color: var(--purple);
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(155,93,229,0.25);
    animation: wiggle 3s ease-in-out infinite;
    flex: 0 0 auto;
  }
  @keyframes wiggle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

  .scoreboard { display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; flex: 0 0 auto; }
  .chip {
    background: #fff; border: 3px solid var(--ink); border-radius: 12px;
    padding: 3px 8px; font-weight: 800; font-size: 0.72rem; box-shadow: 0 3px 0 var(--ink); min-width: 70px;
  }
  .chip b { display: block; font-size: 1.05rem; }

  .tabs { display: flex; gap: 5px; margin-bottom: 10px; flex: 0 0 auto; }
  .tab {
    flex: 1; border: 3px solid var(--ink); background: #fff; color: var(--ink);
    padding: 6px 1px; font-family: inherit; font-weight: 800; border-radius: 13px; cursor: pointer;
    box-shadow: 0 4px 0 var(--ink); display: flex; flex-direction: column; align-items: center; gap: 1px;
    line-height: 1; transition: transform 0.08s, box-shadow 0.08s, background 0.15s;
  }
  .tab .ico { font-size: 1.15rem; }
  .tab .lbl { font-size: 0.58rem; }
  .tab:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .tab.active { background: var(--yellow); }

  .panels { flex: 1 1 auto; min-height: 0; position: relative; }
  .panel { display: none; height: 100%; }
  .panel.active { display: flex; flex-direction: column; height: 100%; animation: pop 0.25s ease; }
  @keyframes pop { 0% { transform: scale(0.97); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .stage {
    flex: 1 1 auto; min-height: 0;
    background: #fff; border: 4px dashed var(--blue); border-radius: 18px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 8px; margin-bottom: 8px;
  }
  .stage img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  #flagImg, #quizImg.as-flag, .combo-flag { box-shadow: 0 5px 14px rgba(0,0,0,0.25); }
  #shapeImg, .combo-shape, #quizImg.as-shape {
    padding: 6px;
    filter: drop-shadow(0 3px 7px rgba(0,0,0,0.25))
            brightness(0) saturate(100%) invert(38%) sepia(89%) saturate(2400%) hue-rotate(258deg) brightness(95%) contrast(95%);
  }
  .combo { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; height: 100%; }
  .combo img { max-width: 48%; max-height: 100%; border-radius: 8px; }

  .placeholder { color: #8a8d9f; font-size: 1rem; font-weight: 700; padding: 0 14px; line-height: 1.35; }
  .name { font-size: clamp(1.2rem, 6vw, 1.7rem); font-weight: 800; color: var(--teal); flex: 0 0 auto; margin-bottom: 2px; }
  .name.revealed { animation: boing 0.5s ease; }
  @keyframes boing { 0% { transform: scale(0.3); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
  .name.hidden-name { color: #b7bac7; font-weight: 700; font-size: 1.05rem; }
  .fact { font-size: 0.9rem; font-weight: 700; color: var(--purple); margin: 2px auto 8px; max-width: 440px; line-height: 1.3; flex: 0 0 auto; }

  .buttons { display: flex; gap: 10px; justify-content: center; flex: 0 0 auto; }
  button.action {
    flex: 1 1 50%; border: 4px solid var(--ink); border-radius: 16px; padding: 12px 8px;
    font-family: inherit; font-size: 1.05rem; font-weight: 800; color: var(--ink);
    cursor: pointer; box-shadow: 0 5px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s, opacity 0.2s;
  }
  button.action:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--ink); }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0 5px 0 var(--ink); transform: none; }
  .draw-btn { background: var(--yellow); }
  .reveal-btn { background: var(--red); color: #fff; }

  /* Quiz */
  .difficulty { display: flex; gap: 5px; justify-content: center; margin-bottom: 8px; flex: 0 0 auto; }
  .diff-btn {
    border: 3px solid var(--ink); background: #fff; color: var(--ink); border-radius: 11px;
    padding: 5px 8px; font-family: inherit; font-weight: 800; font-size: 0.78rem; cursor: pointer; box-shadow: 0 3px 0 var(--ink);
  }
  .diff-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--ink); }
  .diff-btn.active { background: var(--blue); color: #fff; }
  .question { font-size: 1rem; font-weight: 800; margin: 0 0 6px; color: var(--ink); flex: 0 0 auto; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; flex: 0 0 auto; }
  .quiz-opt {
    border: 3px solid var(--ink); background: #fff; color: var(--ink); border-radius: 13px;
    padding: 10px 6px; font-family: inherit; font-size: 0.92rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 0 var(--ink); min-height: 50px; transition: transform 0.08s, box-shadow 0.08s;
  }
  .quiz-opt:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .quiz-opt.correct { background: var(--green); color: #fff; }
  .quiz-opt.wrong { background: var(--red); color: #fff; }

  /* Album */
  .album-head { font-size: 0.95rem; font-weight: 800; color: var(--purple); margin-bottom: 6px; flex: 0 0 auto; }
  .album-grid {
    flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 6px;
    padding: 6px; background: #fff; border: 4px dashed var(--blue); border-radius: 16px; margin-bottom: 8px;
  }
  .sticker {
    aspect-ratio: 1 / 1; border-radius: 10px; border: 2px solid #e3e3ef; background: #f4f4fa;
    display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 3px;
  }
  .sticker.got { border-color: var(--green); background: #eafff0; }
  .sticker img { width: 100%; max-height: 60%; object-fit: contain; border-radius: 3px; }
  .sticker .nm { font-size: 0.5rem; font-weight: 800; line-height: 1; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .sticker .lock { font-size: 1.4rem; }

  .toast {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 9px 16px; border-radius: 14px;
    font-weight: 800; font-size: 0.85rem; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90vw;
  }
  .toast.show { opacity: 0.96; }
  .confetti { position: fixed; top: -40px; font-size: 1.6rem; pointer-events: none; z-index: 999; animation: fall linear forwards; }
  @keyframes fall { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0.9; } }
</style>
</head>

    <div id="toast" class="toast"></div>

    <div class="panels">
      <!-- FLAGS -->
      <div class="panel active" id="panel-flag">
        <div class="stage">
          <img id="flagImg" alt="" style="display:none;">
          <div class="placeholder" id="flagPlaceholder">Tap the big button to see a mystery flag! 🚩</div>
        </div>
        <div class="name hidden-name" id="flagName">🙈 Tap Who is it?</div>
        <div class="fact" id="flagFact"></div>
        <div class="buttons">

          <button class="action reveal-btn" id="flagReveal" disabled>🙈 Who is it?</button>
        </div>
      </div>

      <!-- SHAPES -->
      <div class="panel" id="panel-shape">
        <div class="stage">
          <img id="shapeImg" alt="" style="display:none;">
          <div class="placeholder" id="shapePlaceholder">Tap to see a mystery country shape! 🗺️</div>
        </div>
        <div class="name hidden-name" id="shapeName">🙈 Tap Who is it?</div>
        <div class="fact" id="shapeFact"></div>
        <div class="buttons">
          <button class="action draw-btn" id="shapeBtn">🎲 New Shape!</button>
          <button class="action reveal-btn" id="shapeReveal" disabled>🙈 Who is it?</button>
        </div>
      </div>

      <!-- BOTH -->
      <div class="panel" id="panel-both">
        <div class="stage">
          <div class="combo" id="comboMedia" style="display:none;">
            <img id="bothFlagImg" class="combo-flag" alt="">
            <img id="bothShapeImg" class="combo-shape" alt="">
          </div>
          <div class="placeholder" id="bothPlaceholder">Tap to see a flag AND a shape together! ✨</div>
        </div>
        <div class="name hidden-name" id="bothName">🙈 Tap Who is it?</div>
        <div class="fact" id="bothFact"></div>
        <div class="buttons">
          <button class="action draw-btn" id="bothBtn">🎲 Surprise!</button>
          <button class="action reveal-btn" id="bothReveal" disabled>🙈 Who is it?</button>
        </div>
      </div>

      <!-- QUIZ -->
      <div class="panel" id="panel-quiz">
        <div class="difficulty">
          <button class="diff-btn" data-diff="flag">🚩 Easy</button>
          <button class="diff-btn active" data-diff="mix">✨ Medium</button>
          <button class="diff-btn" data-diff="shape">🗺️ Hard</button>
        </div>
        <div class="stage">
          <img id="quizImg" alt="" style="display:none;">
          <div class="placeholder" id="quizPlaceholder">Get ready to guess... 🧠</div>
        </div>
        <div class="question" id="quizQuestion">Which country is this? 🤔</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="fact" id="quizFact"></div>
        <div class="buttons">
          <button class="action draw-btn" id="quizNext">➡️ Next!</button>
        </div>
      </div>

      <!-- ALBUM -->
      <div class="panel" id="panel-album">
        <div class="album-head" id="albumHead">📔 My Stickers: 0 / 0</div>
        <div class="album-grid" id="albumGrid"></div>
        <div class="buttons">
          <button class="action reveal-btn" id="resetBtn">🧹 Reset Progress</button>
        </div>
      </div>
    </div>
  </div>

const HIDDEN_TEXT = "🙈 Tap Who is it?";
const PRAISE = ["🎉 Woohoo!","🌟 Awesome!","🥳 You got it!","🚀 Genius!","🏆 Champion!"];

// ---- Saved progress ----
const SAVE_KEY = "limosWorld";
let stars = 0, best = 0, streak = 0;
let collected = new Set();
function loadSave() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
    stars = s.stars || 0; best = s.best || 0;
    collected = new Set(s.collected || []);
  } catch (e) { /* ignore */ }
}
function persist() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ stars, best, collected: [...collected] })); }
  catch (e) { /* ignore */ }
}

// ---- Scoreboard ----
const scStars = document.getElementById("scStars");
const scStreak = document.getElementById("scStreak");
const scBest = document.getElementById("scBest");
function renderScore() { scStars.textContent = stars; scStreak.textContent = streak; scBest.textContent = best; }
function addStar(n = 1) { stars += n; renderScore(); persist(); }
function bumpStreak() { streak++; if (streak > best) best = streak; renderScore(); persist(); }
function resetStreak() { streak = 0; renderScore(); }

// ---- Sounds ----
let audioCtx = null;
function beep(freq, start, dur, type = "sine", gain = 0.15) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const t = audioCtx.currentTime + start;
  const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(audioCtx.destination); osc.start(t); osc.stop(t + dur);
}
function playPop()   { beep(520, 0, 0.12, "triangle", 0.18); }
function playCheer() { [523, 659, 784, 1046].forEach((f, i) => beep(f, i * 0.09, 0.18, "square", 0.12)); }
function playBuzz()  { beep(196, 0, 0.25, "sawtooth", 0.14); beep(155, 0.12, 0.28, "sawtooth", 0.14); }

// ---- Confetti ----
const CONFETTI = ["🎉","⭐","🌟","🎊","✨","🏆","🥳","🌈"];
function spawnConfetti() {
  for (let i = 0; i < 22; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
    el.style.left = Math.random() * 100 + "vw";
    const dur = 1.6 + Math.random() * 1.4;
    el.style.animationDuration = dur + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 100);
  }
}

function randomCountry() { return countries[Math.floor(Math.random() * countries.length)]; }
const flagSrc  = country => "https://flagcdn.com/w320/" + country.c + ".png";
const shapeSrc = country => "https://cdn.jsdelivr.net/gh/djaiss/mapsicon@master/all/" + country.c + "/512.png";

// ---- Sticker album ----
const albumGrid = document.getElementById("albumGrid");
const albumHead = document.getElementById("albumHead");
let albumBuilt = false;
function buildAlbum() {
  albumGrid.innerHTML = "";
  countries.forEach(country => {
    const cell = document.createElement("div");
    cell.className = "sticker" + (collected.has(country.c) ? " got" : "");
    cell.dataset.code = country.c;
    if (collected.has(country.c)) {
      cell.innerHTML = '<img src="' + flagSrc(country) + '" alt=""><span class="nm">' + country.n + '</span>';
    } else {
      cell.innerHTML = '<span class="lock">❓</span>';
    }
    albumGrid.appendChild(cell);
  });
  albumBuilt = true;
  updateAlbumHead();
}
function updateAlbumHead() {
  albumHead.textContent = "📔 My Stickers: " + collected.size + " / " + countries.length;
}
function collect(country) {
  if (collected.has(country.c)) return;
  collected.add(country.c);
  persist();
  updateAlbumHead();
  if (albumBuilt) {
    const cell = albumGrid.querySelector('.sticker[data-code="' + country.c + '"]');
    if (cell) { cell.classList.add("got"); cell.innerHTML = '<img src="' + flagSrc(country) + '" alt=""><span class="nm">' + country.n + '</span>'; }
  }
}

// ---- Tabs ----
let quizStarted = false;
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
    if (tab.dataset.tab === "quiz" && !quizStarted) { quizStarted = true; newQuizQuestion(); }
    if (tab.dataset.tab === "album") buildAlbum();
  });
});

// ---- Explore panels ----
function setupPanel({ drawId, revealId, mediaId, images, placeholderId, nameId, factId }) {
  const drawBtn = document.getElementById(drawId);
  const revealBtn = document.getElementById(revealId);
  const media = document.getElementById(mediaId);
  const placeholder = document.getElementById(placeholderId);
  const nameEl = document.getElementById(nameId);
  const factEl = document.getElementById(factId);
  const imgs = images.map(({ id, srcFor }) => ({ el: document.getElementById(id), srcFor }));
  let current = null, scored = false;

  drawBtn.addEventListener("click", () => {
    current = randomCountry(); scored = false;
    imgs.forEach(({ el, srcFor }) => { el.src = srcFor(current); el.alt = ""; });
    media.style.display = ""; placeholder.style.display = "none";
    nameEl.textContent = HIDDEN_TEXT; nameEl.classList.add("hidden-name"); nameEl.classList.remove("revealed");
    factEl.textContent = ""; revealBtn.disabled = false; playPop();
  });

  revealBtn.addEventListener("click", () => {
    if (!current) return;
    nameEl.textContent = "🎉 " + current.n + "!"; nameEl.classList.remove("hidden-name");
    void nameEl.offsetWidth; nameEl.classList.add("revealed");
    factEl.textContent = "💡 " + (facts[current.c] || "A wonderful place to explore!");
    if (!scored) { scored = true; addStar(); }
    collect(current);
    playCheer(); spawnConfetti();
  });
}
setupPanel({ drawId:"flagBtn", revealId:"flagReveal", mediaId:"flagImg",
  placeholderId:"flagPlaceholder", nameId:"flagName", factId:"flagFact",
  images:[{ id:"flagImg", srcFor:flagSrc }] });
setupPanel({ drawId:"shapeBtn", revealId:"shapeReveal", mediaId:"shapeImg",
  placeholderId:"shapePlaceholder", nameId:"shapeName", factId:"shapeFact",
  images:[{ id:"shapeImg", srcFor:shapeSrc }] });
setupPanel({ drawId:"bothBtn", revealId:"bothReveal", mediaId:"comboMedia",
  placeholderId:"bothPlaceholder", nameId:"bothName", factId:"bothFact",
  images:[{ id:"bothFlagImg", srcFor:flagSrc }, { id:"bothShapeImg", srcFor:shapeSrc }] });

// ---- Quiz ----
const quizImg = document.getElementById("quizImg");
const quizPlaceholder = document.getElementById("quizPlaceholder");
const quizQuestion = document.getElementById("quizQuestion");
const quizOptions = document.getElementById("quizOptions");
const quizFact = document.getElementById("quizFact");
const quizNext = document.getElementById("quizNext");
let quizAnswer = null, quizAnswered = false, quizMode = "mix";

document.querySelectorAll(".diff-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    quizMode = btn.dataset.diff;
    newQuizQuestion();
  });
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function newQuizQuestion() {
  quizAnswered = false; quizAnswer = randomCountry();
  const useShape = quizMode === "shape" ? true : quizMode === "flag" ? false : Math.random() < 0.5;
  quizImg.className = useShape ? "as-shape" : "as-flag";
  quizImg.src = useShape ? shapeSrc(quizAnswer) : flagSrc(quizAnswer);
  quizImg.style.display = "block"; quizPlaceholder.style.display = "none";
  quizQuestion.textContent = useShape ? "Which country has this shape? 🤔" : "Which country owns this flag? 🤔";

  const opts = [quizAnswer];
  while (opts.length < 4) {
    const pick = randomCountry();
    if (!opts.some(o => o.c === pick.c)) opts.push(pick);
  }
  shuffle(opts);
  quizOptions.innerHTML = "";
  opts.forEach(country => {
    const btn = document.createElement("button");
    btn.className = "quiz-opt"; btn.textContent = country.n;
    btn.addEventListener("click", () => answerQuiz(country, btn));
    quizOptions.appendChild(btn);
  });
  quizFact.textContent = ""; quizNext.style.display = "none";
}
function answerQuiz(country, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizOptions.querySelectorAll(".quiz-opt").forEach(b => {
    b.disabled = true; if (b.textContent === quizAnswer.n) b.classList.add("correct");
  });
  collect(quizAnswer);
  if (country.c === quizAnswer.c) {
    addStar(); bumpStreak();
    quizFact.textContent = PRAISE[Math.floor(Math.random() * PRAISE.length)] + " It's " + quizAnswer.n + ". 💡 " + (facts[quizAnswer.c] || "");
    playCheer(); spawnConfetti();
  } else {
    btn.classList.add("wrong"); resetStreak();
    quizFact.textContent = "🙂 Not quite — it's " + quizAnswer.n + ". 💡 " + (facts[quizAnswer.c] || "");
    playBuzz();
  }
  quizNext.style.display = "";
}
quizNext.addEventListener("click", newQuizQuestion);

// ---- Reset ----
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Start over? This clears your stars and stickers.")) return;
  stars = 0; best = 0; streak = 0; collected = new Set();
  persist(); renderScore(); buildAlbum();
});

// ---- Start ----
loadSave();
renderScore();

// ---- Friendly toast ----
function toast(msg, ms = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), ms);
}

// ---- Make it installable / work offline ----
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.addEventListener("message", (e) => {
    if (e.data && e.data.type === "offline-ready") toast("✅ Ready to play offline!");
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").then((reg) => {
      // First-ever install: we're about to download every flag and shape.
      if (reg.installing && !navigator.serviceWorker.controller) {
        toast("📥 Saving the whole world for offline… hang tight!", 6000);
      }
    }).catch(() => {});
  });
}
